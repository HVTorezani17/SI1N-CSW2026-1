<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Henrique Torezani</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #222;
      margin: 0;
      padding: 0;
    }
    nav {
      background-color: #1a1a2e;
      padding: 12px 20px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin-right: 20px;
      font-size: 16px;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .conteudo {
      max-width: 700px;
      margin: 30px auto;
      padding: 0 20px;
    }
    h1 {
      color: #1a1a2e;
    }
    h2 {
      color: #333;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 5px;
    }
    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
    }
    .radio-group {
      margin-top: 5px;
    }
    .radio-group label {
      font-weight: normal;
      display: inline;
      margin-left: 5px;
    }
    .checkbox-group label {
      font-weight: normal;
      display: inline;
      margin-left: 5px;
    }
    input[type="submit"] {
      margin-top: 20px;
      background-color: #1a1a2e;
      color: #fff;
      padding: 10px 30px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #2e2e5e;
    }
    .info-contato {
      background-color: #1a1a2e;
      color: #fff;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 25px;
    }
    .info-contato a {
      color: #ccc;
    }
    footer {
      background-color: #1a1a2e;
      color: #fff;
      text-align: center;
      padding: 12px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="curriculo.html">Currículo</a>
  <a href="github.html">GitHub</a>
  <a href="servicos.html">Serviços</a>
  <a href="contato.html">Contato</a>
</nav>

<div class="conteudo">

  <h1>Contato</h1>

  <div class="info-contato">
    <p><strong>E-mail:</strong> <a href="mailto:hvtorezani@gmail.com">hvtorezani@gmail.com</a></p>
    <p><strong>Telefone / WhatsApp:</strong> +55 (27) 98865-5212</p>
  </div>

  <h2>Envie uma mensagem</h2>
  <p>Preencha o formulário abaixo e entrarei em contato com você!</p>

  <form action="#" method="post">

    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" name="nome" placeholder="Seu nome completo">

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telefone" placeholder="(XX) 9XXXX-XXXX">

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="seuemail@email.com">

    <label>Tipo de pessoa:</label>
    <div class="radio-group">
      <input type="radio" name="tipopessoa" id="fisica" value="fisica" checked>
      <label for="fisica">Pessoa Física</label>
      &nbsp;&nbsp;
      <input type="radio" name="tipopessoa" id="juridica" value="juridica">
      <label for="juridica">Pessoa Jurídica</label>
    </div>

    <label for="horario">Melhor horário para contato:</label>
    <select id="horario" name="horario">
      <option value="">Selecione...</option>
      <option value="7-9">07:00 às 09:00</option>
      <option value="9-12">09:00 às 12:00</option>
      <option value="12-14">12:00 às 14:00</option>
      <option value="14-17">14:00 às 17:00</option>
    </select>

    <label>Tipo de serviço desejado:</label>
    <div class="checkbox-group">
      <input type="checkbox" id="estatico" name="servico" value="estatico">
      <label for="estatico">Site Estático (HTML/CSS)</label><br>
      <input type="checkbox" id="dinamico" name="servico" value="dinamico">
      <label for="dinamico">Site Dinâmico (com JavaScript)</label><br>
      <input type="checkbox" id="avancado" name="servico" value="avancado">
      <label for="avancado">Site Avançado (com banco de dados)</label><br>
      <input type="checkbox" id="outro" name="servico" value="outro">
      <label for="outro">Outro / Não sei ainda</label>
    </div>

    <label for="descricao">Descreva o que você precisa:</label>
    <textarea id="descricao" name="descricao" rows="5" placeholder="Fale um pouco sobre o seu projeto ou o que você está buscando..."></textarea>

    <input type="submit" value="Enviar mensagem">

  </form>

</div>


  


</body>
</html>
